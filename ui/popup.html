<!DOCTYPE html>
<html>

<head>
    <title>PageSnack</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Page<span>Snack</span></h1>
                <p>AI Summary & Insights</p>
            </div>
            <button id="clear" class="btn-clear" title="Clear summary">Clear</button>
        </header>

        <main>
            <div id="page-info" class="page-info">
                <h2 id="page-title">Loading title...</h2>
                <span id="reading-time"></span>
            </div>
            
            <div id="output" class="output-area">
                <p class="placeholder">Click summarize to get insights from this page.</p>
            </div>

            <div id="insights-container" class="insights-container" style="display: none;">
                <h3>Key Insights</h3>
                <p id="insights-text"></p>
            </div>
        </main>

        <footer>
            <button id="summarize">Summarize Page</button>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
